version: '3.9'

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: trsr
      POSTGRES_USER: trsr
      POSTGRES_PASSWORD: trsr_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgresql://trsr:trsr_dev@db:5432/trsr
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - db
    develop:
      watch:
        - action: sync
          path: ./apps/api/src
          target: /app/src

  web:
    build: ./apps/web
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000

volumes:
  postgres_data:
